# Configuration file for IFT712 Project
# NASA Near-Earth Objects (NEO) Classification

# Paths configuration
paths:
  dataset: "datasets/neo.csv"

# Data preprocessing configuration
preprocessing:
  numerical_features:
    - "est_diameter_min"
    - "est_diameter_max"
    - "relative_velocity"
    - "miss_distance"
    - "absolute_magnitude"
  target_column: "hazardous"
  test_size: 0.2
  random_state: 42
  stratify: true

# Model hyperparameters
models:
  decision_tree:
    max_depth: 5
    criterion: "gini"
    random_state: 42

  neural_network:
    hidden_layer_sizes: [64, 32]
    activation: "relu"            
    solver: "adam"                
    alpha: 0.0001                 
    learning_rate_init: 0.001     
    max_iter: 500                 
    early_stopping: true          
    random_state: 42
