# Configuration file for IFT712 Project
# NASA Near-Earth Objects (NEO) Classification

# Paths configuration
paths:
  dataset: "datasets/neo.csv"

# Data preprocessing configuration
preprocessing:
  numerical_features:
    - "est_diameter_min"
    - "est_diameter_max"
    - "relative_velocity"
    - "miss_distance"
    - "absolute_magnitude"
  target_column: "hazardous"
  test_size: 0.2
  random_state: 42
  stratify: true

# Model hyperparameters
models:
  decision_tree:
    max_depth: 5
    criterion: "gini"
    random_state: 42

  svm:
    kernel: "rbf"        # or 'linear', 'poly', etc.
    C: 1.0               # Must be > 0
    probability: true    # Necessary for AUC and predict_with_details
    class_weight: "balanced" # or null (write null without quotes in YAML for None)

kernel_ridge:
    alpha: 1.0            # Regularization (Low alpha = Overfitting risk, High alpha = Underfitting)
    kernel: "rbf"         # "rbf" (Gaussian) is the standard choice. Others: "poly", "linear"
    gamma: 0.1            # Kernel width (for RBF). None defaults to 1 / n_features
    degree: 3             # Only used if kernel is "poly"

  logistic_regression:
    penalty: "l2"         # "l1" (lasso), "l2" (ridge), "elasticnet"
    C: 1.0                # Inverse of regularization strength (1.0 = standard, 0.01 = strong)
    solver: "lbfgs"       # "liblinear" (for small datasets/L1), "lbfgs" (standard)
    max_iter: 1000        # Increase if the model does not converge
    class_weight: null    # Set to "balanced" for imbalanced datasets
  
  naive_bayes:
    var_smoothing: 1e-9
    
  neural_network:
    hidden_layer_sizes: [64, 32]
    activation: "relu"            
    solver: "adam"                
    alpha: 0.0001                 
    learning_rate_init: 0.001     
    max_iter: 500                 
    early_stopping: true          
    random_state: 42

  kmeans:
    n_clusters: 3         # The "K": number of expected groups. Adjust based on dataset.
    init: "k-means++"     # Smart initialization of centers (faster/more stable).
    n_init: 10            # Number of re-runs with different seeds to avoid local minima.
    max_iter: 300         # Maximum iterations per run.
    random_state: 42
  
