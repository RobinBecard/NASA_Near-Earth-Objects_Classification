# Configuration file for IFT712 Project
# NASA Near-Earth Objects (NEO) Classification

# Paths configuration
paths:
  dataset: "datasets/neo.csv"

# Model comparison configuration
model_comparison:
  plot_n_cols: 4  # Number of columns in comparison plot grid
  plot_figsize: [20, 12]  # Figure size [width, height] in inches

# Data preprocessing configuration
preprocessing:
  numerical_features:
    - "est_diameter_min"
    - "est_diameter_max"
    - "relative_velocity"
    - "miss_distance"
    - "absolute_magnitude"
  log_features:
    - "est_diameter_max"
    - "relative_velocity"
    - "miss_distance"
  other_features: 
    - "absolute_magnitude"
  target_column: "hazardous"
  test_size: 0.2
  random_state: 42
  stratify: true

# Model hyperparameters
models:
  decision_tree:
    class_weight: "balanced"
    criterion: "gini"
    max_depth: 20
    max_features: "sqrt"
    min_samples_leaf: 25
    min_samples_split: 500
    random_state: 42

  svm:
    kernel: "rbf"
    gamma: "scale"
    class_weight: "balanced"
    C: 100.0
    random_state: 42

  logistic_regression:
    C: 100.0
    class_weight: "balanced"
    max_iter: 1000
    penalty: "l1"
    solver: "saga"
    random_state: 42
  
  naive_bayes:
    var_smoothing: 0.0000000001 # 10^-10
    
  neural_network:
    activation: "relu"
    alpha: 0.001
    early_stopping: true
    hidden_layer_sizes: [32]
    learning_rate_init: 0.001
    max_iter: 1000
    solver: "adam"
    random_state: 42

  least_squares:
    alpha: 100.0
    class_weight: "balanced"
    solver: "auto"
    random_state: 42
  
