optimization_config:
  cv_folds: 5
  scoring: "roc_auc"
  n_jobs: -1
  verbose: 1
  
  search_strategies:
    decision_tree: "grid"
    logistic_regression: "grid"
    naive_bayes: "grid"
    least_squares: "grid"
    svm: "grid"
    neural_network: "grid"

  random_search_iterations:
    svm: 8
  
  sample_sizes:
    svm: 0.5

param_grids:
  
  decision_tree:
    max_depth: [8, 12, 16, 20, null]
    criterion: ["gini", "entropy"]
    min_samples_split: [50, 100, 200, 500]
    min_samples_leaf: [25, 50, 100, 200]
    max_features: ["sqrt", "log2", null]
    class_weight: ["balanced"]
  
  svm:
    kernel: ["rbf"]  # Reduced for speed
    C: [0.1, 1.0, 10.0, 100.0]
    gamma: ["scale", 0.01]  # Reduced from 4 to 2 values
    class_weight: ["balanced"]
  
  logistic_regression:
    C: [0.01, 0.1, 1.0, 10.0, 100.0]
    penalty: ["l1", "l2"]
    solver: ["liblinear", "saga"]
    max_iter: [1000, 2000]
    class_weight: ["balanced"]
  
  naive_bayes:
    var_smoothing: [0.0000000001, 0.000000001, 0.00000001, 0.0000001]
  
  neural_network:
    hidden_layer_sizes: [[8], [16], [32], [16, 8]]
    activation: ["relu", "tanh"]
    solver: ["adam"]
    alpha: [0.0001, 0.001, 0.01]
    learning_rate_init: [0.001, 0.01]
    max_iter: [1000]
    early_stopping: [true]
  
  least_squares:
    alpha: [0.01, 0.1, 1.0, 10.0, 100.0]
    solver: ["auto", "cholesky", "lsqr"]
    class_weight: ["balanced"]